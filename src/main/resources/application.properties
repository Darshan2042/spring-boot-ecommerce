spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.url=jdbc:h2:mem:ecommercedb
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.h2.console.enabled=true

spring.data.rest.base-path=/api

# Use legacy path matcher to avoid Spring MVC path matching issues
spring.mvc.pathmatch.matching-strategy=ant_path_matcher

# JWT Configuration
app.jwtSecret=${JWT_SECRET:MyVeryLongSecretKeyForJWTTokenGenerationAndValidation001234567890ABC}
app.jwtExpirationMs=86400000

